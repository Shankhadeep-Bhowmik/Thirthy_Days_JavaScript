<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="style.css"
      rel="stylesheet"
    />
    <title>To-Do List App</title>
  </head>
  <body>
    <div class="container">
      <h1 class="headingText">To-Do List</h1>
      <div class="inputBar">
        <input type="text" id="inputTask" placeholder="Enter task">
        <button id="addBtn" class="addBtn">Add</button>
      </div>
      <div class="task-container">
        <ul id="taskList">
          
        </ul>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
